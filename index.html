<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Pro - Arkadaşına Özel</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loadingScreen">
        <div class="loading-content">
            <div class="cube-loader">
                <div class="cube cube1"></div>
                <div class="cube cube2"></div>
                <div class="cube cube3"></div>
                <div class="cube cube4"></div>
            </div>
            <h1 class="loading-text">Minecraft Pro Yükleniyor...</h1>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <div id="gameContainer" style="display: none;">
        <header class="game-header">
            <div class="game-title">
                <h1>⛏️ MINECRAFT PRO ⛏️</h1>
                <p class="subtitle">Arkadaşına Özel Versiyon</p>
            </div>
            <div class="game-stats">
                <div class="stat-item">
                    <span class="stat-icon">❤️</span>
                    <span id="health">100</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🍖</span>
                    <span id="hunger">100</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">⭐</span>
                    <span id="level">1</span>
                </div>
            </div>
        </header>

        <main class="game-main">
            <div class="game-world" id="gameWorld">
                <canvas id="gameCanvas" width="1200" height="600"></canvas>
                <div class="world-overlay">
                    <div class="coordinates">
                        <span>X: <span id="coordX">0</span></span>
                        <span>Y: <span id="coordY">64</span></span>
                        <span>Z: <span id="coordZ">0</span></span>
                    </div>
                    <div class="time-display">
                        <span id="gameTime">Gündüz 12:00</span>
                    </div>
                </div>
            </div>

            <aside class="game-sidebar">
                <div class="inventory" id="inventory">
                    <h3>🎒 Envanter</h3>
                    <div class="inventory-grid">
                        <div class="inventory-slot" data-slot="0">
                            <div class="item-icon">🪵</div>
                            <div class="item-count">64</div>
                        </div>
                        <div class="inventory-slot" data-slot="1">
                            <div class="item-icon">🪨</div>
                            <div class="item-count">32</div>
                        </div>
                        <div class="inventory-slot" data-slot="2">
                            <div class="item-icon">🌾</div>
                            <div class="item-count">16</div>
                        </div>
                        <div class="inventory-slot" data-slot="3"></div>
                        <div class="inventory-slot" data-slot="4"></div>
                        <div class="inventory-slot" data-slot="5"></div>
                        <div class="inventory-slot" data-slot="6"></div>
                        <div class="inventory-slot" data-slot="7"></div>
                        <div class="inventory-slot" data-slot="8"></div>
                    </div>
                </div>

                <div class="crafting-menu" id="craftingMenu">
                    <h3>🔨 Crafting</h3>
                    <div class="crafting-grid">
                        <div class="crafting-slot"></div>
                        <div class="crafting-slot"></div>
                        <div class="crafting-slot"></div>
                        <div class="crafting-slot"></div>
                        <div class="crafting-result">
                            <div class="result-item">?</div>
                        </div>
                    </div>
                </div>

                <div class="controls-info">
                    <h3>🎮 Kontroller</h3>
                    <div class="control-list">
                        <div class="control-item">
                            <span class="key">WASD</span>
                            <span class="action">Hareket</span>
                        </div>
                        <div class="control-item">
                            <span class="key">Boşluk</span>
                            <span class="action">Zıplama</span>
                        </div>
                        <div class="control-item">
                            <span class="key">Sol Tık</span>
                            <span class="action">Kır</span>
                        </div>
                        <div class="control-item">
                            <span class="key">Sağ Tık</span>
                            <span class="action">Yerleştir</span>
                        </div>
                        <div class="control-item">
                            <span class="key">E</span>
                            <span class="action">Envanter</span>
                        </div>
                        <div class="control-item">
                            <span class="key">ESC</span>
                            <span class="action">Menü</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <div class="game-menu" id="gameMenu" style="display: none;">
            <div class="menu-content">
                <h2>🎮 Oyun Menüsü</h2>
                <div class="menu-buttons">
                    <button class="menu-btn" id="continueBtn">Devam Et</button>
                    <button class="menu-btn" id="saveBtn">Kaydet</button>
                    <button class="menu-btn" id="loadBtn">Yükle</button>
                    <button class="menu-btn" id="settingsBtn">Ayarlar</button>
                    <button class="menu-btn" id="exitBtn">Çıkış</button>
                </div>
            </div>
        </div>
    </div>

    <script src="src/js/game.js"></script>
    <script src="src/js/world.js"></script>
    <script src="src/js/player.js"></script>
    <script src="src/js/inventory.js"></script>
    <script src="src/js/crafting.js"></script>
    <script src="src/js/main.js"></script>
</body>
</html>
